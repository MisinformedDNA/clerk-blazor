<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClerkBlazor</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="ClerkBlazor.styles.css" rel="stylesheet" />
    <script type="importmap"></script>

    <!--
        Clerk JavaScript SDK (latest stable).
        Loads the Clerk browser bundle and exposes window.Clerk.

        CDN URL reference: https://clerk.com/docs/quickstarts/javascript
        If Clerk releases a new major version, update the @latest pin below
        and verify the API shape in wwwroot/js/clerkInterop.js.
    -->
    <script
        async
        crossorigin="anonymous"
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
        type="text/javascript">
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <!--
        Blazor WASM runtime – must come after the Clerk CDN script so that
        clerkInterop.js can safely reference window.Clerk on first use.
    -->
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

    <!-- Clerk JS interop helpers used by ClerkAuthService. -->
    <script src="js/clerkInterop.js"></script>
</body>

</html>
